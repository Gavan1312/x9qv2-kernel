name: Run all

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"   # every 5 hours with buffer

concurrency:
  group: all-main-runner
  cancel-in-progress: true

jobs:

  bot-1:
    name: Bot 1
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: Checkout repo 1
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd repo1
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot 1
        run: |
          cd repo1
          echo "Bot 1 started at $(date)"
          while true
          do
            python hfmain.py
            echo "Bot 1 crashed. Restarting..."
            sleep 5
          done
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DEV_API_HASH: ${{ secrets.DEV_API_HASH }}
          DEV_API_ID: ${{ secrets.DEV_API_ID }}
          FROOT_STICKER_ID: ${{ secrets.FROOT_STICKER_ID }}

  bot-2:
    name: Bot 2
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: Checkout repo 2
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE2 }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd repo2
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot 2
        run: |
          cd repo2
          echo "Bot 2 started at $(date)"
          while true
          do
            python hfmain.py
            echo "Bot 2 crashed. Restarting..."
            sleep 5
          done
        env:
          BOT_TOKEN: ${{ secrets.BOT2_TOKEN }}
          DEV_API_HASH: ${{ secrets.DEV_API_HASH }}
          DEV_API_ID: ${{ secrets.DEV_API_ID }}
          FROOT_STICKER_ID: ${{ secrets.FROOT2_STICKER_ID }}
