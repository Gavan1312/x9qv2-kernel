name: Run all in one

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: all-main-runner-in-one
  cancel-in-progress: true

jobs:
  run-all:
    runs-on: ubuntu-latest
    timeout-minutes: 290

    steps:
      - name: Checkout repo 1
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo1

      - name: Checkout repo 2
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE2 }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo2
          
      - name: Checkout repo 3
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE3 }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo3

      - name: Checkout repo 4
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE4 }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo4
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          for dir in repo1 repo2; do
            cd $dir
            pip install --upgrade pip
            pip install -r requirements.txt
            cd ..
          done

      - name: Run both bots safely
        run: |
          echo "Starting bots..."

          run_bot () {
            NAME=$1
            DIR=$2
            TOKEN=$3
            STICKER=$4

            while true
            do
              echo "[$NAME | PID $$] started at $(date)"

              (
                cd $DIR

                BOT_TOKEN=$TOKEN \
                FROOT_STICKER_ID=$STICKER \
                python hfmain.py 2>&1 | tee -a ../${NAME// /_}.log
              )

              EXIT_CODE=$?

              echo "[$NAME] crashed with exit code $EXIT_CODE"
              echo "[$NAME] Restarting in 5 seconds..."

              sleep 10
            done
          }

          is_running () {
            kill -0 $1 2>/dev/null
          }

          # Start bots
          run_bot "Bot 1" repo1 "$BOT_TOKEN" "$FROOT_STICKER_ID" &
          PID1=$!

          sleep 3

          run_bot "Bot 2" repo2 "$BOT2_TOKEN" "$FROOT2_STICKER_ID" &
          PID2=$!
          
          sleep 3

          run_bot "Bot 3" repo3 "$BOT3_TOKEN" "$FROOT3_STICKER_ID" &
          PID3=$!

          sleep 3

          run_bot "Bot 4" repo4 "$BOT4_TOKEN" "$FROOT4_STICKER_ID" &
          PID4=$!

          echo "Bot 1 PID: $PID1"
          echo "Bot 2 PID: $PID2"
          echo "Bot 3 PID: $PID3"
          echo "Bot 4 PID: $PID4"

          # Watchdog loop
          while true
          do
            if ! is_running $PID1; then
              echo "Bot 1 died. Restarting..."
              run_bot "Bot 1" repo1 "$BOT_TOKEN" "$FROOT_STICKER_ID" &
              PID1=$!
              echo "Bot 1 new PID: $PID1"
            fi

            if ! is_running $PID2; then
              echo "Bot 2 died. Restarting..."
              run_bot "Bot 2" repo2 "$BOT2_TOKEN" "$FROOT2_STICKER_ID" &
              PID2=$!
              echo "Bot 2 new PID: $PID2"
            fi

            if ! is_running $PID3; then
              echo "Bot 3 died. Restarting..."
              run_bot "Bot 3" repo3 "$BOT3_TOKEN" "$FROOT3_STICKER_ID" &
              PID3=$!
              echo "Bot 3 new PID: $PID3"
            fi

            if ! is_running $PID4; then
              echo "Bot 4 died. Restarting..."
              run_bot "Bot 4" repo4 "$BOT4_TOKEN" "$FROOT4_STICKER_ID" &
              PID4=$!
              echo "Bot 4 new PID: $PID4"
            fi
            
            sleep 60
          done
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT2_TOKEN: ${{ secrets.BOT2_TOKEN }}
          BOT3_TOKEN: ${{ secrets.BOT3_TOKEN }}
          BOT4_TOKEN: ${{ secrets.BOT4_TOKEN }}
          DEV_API_HASH: ${{ secrets.DEV_API_HASH }}
          DEV_API_ID: ${{ secrets.DEV_API_ID }}
          FROOT_STICKER_ID: ${{ secrets.FROOT_STICKER_ID }}
          FROOT2_STICKER_ID: ${{ secrets.FROOT2_STICKER_ID }}
          FROOT3_STICKER_ID: ${{ secrets.FROOT2_STICKER_ID }}
          FROOT4_STICKER_ID: ${{ secrets.FROOT4_STICKER_ID }}
