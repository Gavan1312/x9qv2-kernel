name: Run x9qv2-up-kernel2

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"   # every 6 hours (safe)

concurrency:
  group: bot-runner-2
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290   # max allowed (6 hours)

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.CORE2 }}
          token: ${{ secrets.GH_TOKEN }}
          path: repo

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd repo
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run (auto-restart loop)
        run: |
          cd repo
          while true
          do
            echo "Starting bot..."
            python hfmain.py
            echo "Crashed. Restarting in 5 seconds..."
            sleep 5
          done
        env:
          BOT_TOKEN: ${{ secrets.BOT2_TOKEN }}
          DEV_API_HASH: ${{ secrets.DEV_API_HASH }}
          DEV_API_ID: ${{ secrets.DEV_API_ID }}
          FROOT_STICKER_ID: ${{ secrets.FROOT2_STICKER_ID }}
